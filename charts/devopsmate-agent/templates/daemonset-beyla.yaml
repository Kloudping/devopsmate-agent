{{- if .Values.beyla.enabled -}}
# Grafana Beyla — eBPF zero-code traces. Exports OTLP to the local node agent
# (Service, internalTrafficPolicy=Local), which tags tenant + exports securely to
# the gateway. Requires nodeAgent.enabled.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "devopsmate-agent.fullname" . }}-beyla
  namespace: {{ include "devopsmate-agent.namespace" . }}
  labels:
    {{- include "devopsmate-agent.labels" . | nindent 4 }}
    component: beyla
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      component: beyla
  template:
    metadata:
      labels:
        {{- include "devopsmate-agent.labels" . | nindent 8 }}
        component: beyla
    spec:
      serviceAccountName: {{ include "devopsmate-agent.serviceAccountName" . }}
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: beyla
          image: "{{ .Values.beyla.image.repository }}:{{ .Values.beyla.image.tag }}"
          imagePullPolicy: {{ .Values.beyla.image.pullPolicy }}
          securityContext:
            {{- if .Values.beyla.privileged }}
            privileged: true
            runAsUser: 0
            {{- else }}
            runAsUser: 0
            capabilities:
              add: ["BPF", "PERFMON", "SYS_ADMIN", "NET_RAW", "DAC_READ_SEARCH"]
            {{- end }}
          env:
            - name: BEYLA_OPEN_PORT
              value: {{ .Values.beyla.openPorts | quote }}
            - name: BEYLA_KUBERNETES_ENABLE
              value: "true"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "devopsmate-agent.fullname" . }}.{{ include "devopsmate-agent.namespace" . }}.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=devopsmate,collector.type=beyla"
          resources:
            {{- toYaml .Values.beyla.resources | nindent 12 }}
          volumeMounts:
            - { name: sys-kernel, mountPath: /sys/kernel, readOnly: true }
      volumes:
        - name: sys-kernel
          hostPath: { path: /sys/kernel }
{{- end }}
