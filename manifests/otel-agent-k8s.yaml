# =============================================================================
# DevOpsMate OpenTelemetry Collector — Kubernetes Agent (DaemonSet)
# Production Configuration v4
# =============================================================================
#
# ARCHITECTURE (v4): agent → gateway → storage
#   Agents forward all telemetry via OTLP/gRPC to the gateway cluster.
#
# NEW IN v4:
# ┌─────────────────────────────────┬────────────────────────────────────────┐
# │ Dynamic receiver creation       │ receiver_creator + k8s_observer       │
# │ eBPF kernel-level telemetry     │ Grafana Beyla DaemonSet (see below)   │
# │ Single gateway exporter         │ otlp/gateway replaces direct storage  │
# │ Trace-log correlation           │ transform/trace_log_correlation        │
# │ Service name from K8s labels    │ transform/k8s_service_name             │
# └─────────────────────────────────┴────────────────────────────────────────┘
#
# Required environment variables (downward API + ConfigMap/Secret):
#   K8S_NODE_NAME, K8S_POD_NAME, K8S_POD_NAMESPACE
#   DEVOPSMATE_TENANT_ID, OTEL_ENVIRONMENT
#   DEVOPSMATE_GATEWAY_ENDPOINT  (e.g., otel-gateway.devopsmate.svc:4317)
# =============================================================================

receivers:
  # ===========================================================================
  # Application OTLP
  # ===========================================================================
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 4
      http:
        endpoint: 0.0.0.0:4318

  # ===========================================================================
  # Kubelet metrics
  # ===========================================================================
  kubeletstats:
    collection_interval: 15s
    auth_type: serviceAccount
    endpoint: https://${env:K8S_NODE_NAME}:10250
    insecure_skip_verify: true
    metric_groups: [node, pod, container, volume]
    extra_metadata_labels: [container.id]
    k8s_api_config:
      auth_type: serviceAccount

  # ===========================================================================
  # Container logs
  # ===========================================================================
  filelog:
    include: ["/var/log/pods/*/*/*.log"]
    exclude:
      - /var/log/pods/*/otel-agent*/*.log
      - /var/log/pods/*/otel-collector*/*.log
      - /var/log/pods/*/beyla*/*.log
    start_at: end
    include_file_name: true
    include_file_path: true
    max_log_size: 1MiB
    poll_interval: 500ms
    retry_on_failure:
      enabled: true
    operators:
      - type: regex_parser
        id: container_log_parser
        regex: '^(?P<time>[^ ]+) (?P<stream>stdout|stderr) (?P<flags>[^ ]*) (?P<log>.*)$'
        on_error: send
        timestamp:
          parse_from: attributes.time
          layout: '%Y-%m-%dT%H:%M:%S.%fZ'
      - type: move
        from: attributes.log
        to: body
      - type: router
        id: json_router
        routes:
          - output: json_parser
            expr: 'body matches "^\\{"'
        default: noop
      - type: json_parser
        id: json_parser
        parse_from: body
        parse_to: attributes
        on_error: send
      - type: nop
        id: noop
      - type: regex_parser
        id: k8s_metadata_from_path
        parse_from: attributes["log.file.path"]
        regex: '/var/log/pods/(?P<k8s_namespace>[^_]+)_(?P<k8s_pod>[^_]+)_[^/]+/(?P<k8s_container>[^/]+)/'
        on_error: send

  # ===========================================================================
  # Kubernetes events
  # ===========================================================================
  k8s_events:
    auth_type: serviceAccount
    namespaces: []

  # ===========================================================================
  # Service health probes (in-cluster)
  # ===========================================================================
  httpcheck/ingress:
    endpoint: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local/healthz
    method: GET
    collection_interval: 30s

  # ===========================================================================
  # NEW — DYNAMIC RECEIVER CREATION (K8s)
  # Watches the K8s API for pods starting/stopping. When a pod appears on
  # this node with a known port, it creates an integration receiver.
  #
  # Uses k8s_observer extension for pod discovery on the current node.
  # ===========================================================================
  receiver_creator:
    watch_observers: [k8s_observer]
    receivers:
      # ── Redis pods ──
      redis/dynamic:
        rule: type == "port" and port == 6379 and pod.labels["app"] != ""
        config:
          endpoint: '`endpoint`'
          collection_interval: 15s

      # ── MySQL pods ──
      mysql/dynamic:
        rule: type == "port" and port == 3306
        config:
          endpoint: '`endpoint`'
          collection_interval: 15s

      # ── PostgreSQL pods ──
      postgresql/dynamic:
        rule: type == "port" and port == 5432
        config:
          endpoint: '`endpoint`'
          collection_interval: 15s
          tls:
            insecure: true

      # ── MongoDB pods ──
      mongodb/dynamic:
        rule: type == "port" and port == 27017
        config:
          hosts:
            - endpoint: '`endpoint`'
          collection_interval: 15s

      # ── Elasticsearch pods ──
      elasticsearch/dynamic:
        rule: type == "port" and port == 9200
        config:
          endpoint: 'http://`endpoint`'
          collection_interval: 15s
          nodes: ["_local"]

      # ── Nginx pods (stub_status) ──
      nginx/dynamic:
        rule: type == "port" and port == 80 and pod.labels["app.kubernetes.io/name"] == "nginx"
        config:
          endpoint: 'http://`endpoint`/nginx_status'
          collection_interval: 15s

      # ── HTTP health for app pods on 8080 ──
      httpcheck/dynamic_8080:
        rule: type == "port" and port == 8080
        config:
          endpoint: 'http://`endpoint`/health'
          method: GET
          collection_interval: 30s

      # ── HTTP health for app pods on 3000 ──
      httpcheck/dynamic_3000:
        rule: type == "port" and port == 3000
        config:
          endpoint: 'http://`endpoint`/health'
          method: GET
          collection_interval: 30s

      # ── Prometheus scrape for pods with annotation ──
      # Pods with annotation prometheus.io/scrape: "true" get scraped.
      prometheus/dynamic:
        rule: type == "port" and pod.annotations["prometheus.io/scrape"] == "true"
        config:
          config:
            scrape_configs:
              - job_name: dynamic-pod
                scrape_interval: 15s
                static_configs:
                  - targets: ['`endpoint`']

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    filter:
      node_from_env_var: K8S_NODE_NAME
    extract:
      metadata:
        - k8s.namespace.name
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.pod.start_time
        - k8s.node.name
        - k8s.container.name
        - k8s.deployment.name
        - k8s.replicaset.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.job.name
        - k8s.cronjob.name
      labels:
        - tag_name: app
          key: app
          from: pod
        - tag_name: app.kubernetes.io/name
          key: app.kubernetes.io/name
          from: pod
        - tag_name: app.kubernetes.io/component
          key: app.kubernetes.io/component
          from: pod
        - tag_name: app.kubernetes.io/version
          key: app.kubernetes.io/version
          from: pod
        - tag_name: app.kubernetes.io/part-of
          key: app.kubernetes.io/part-of
          from: pod
        - tag_name: helm.sh/chart
          key: helm.sh/chart
          from: pod
      annotations:
        - tag_name: owner
          key: owner
          from: pod
        - tag_name: devopsmate.io/service-name
          key: devopsmate.io/service-name
          from: pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: connection

  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

  resource:
    attributes:
      - key: service.namespace
        action: upsert
        value: devopsmate
      - key: devopsmate.tenant_id
        action: upsert
        value: ${env:DEVOPSMATE_TENANT_ID}
      - key: tenant_id
        action: upsert
        value: ${env:DEVOPSMATE_TENANT_ID}
      - key: env
        action: upsert
        value: ${env:OTEL_ENVIRONMENT}
      - key: collector.type
        action: upsert
        value: agent-k8s

  # ===========================================================================
  # K8s service name resolution (6-level priority)
  # ===========================================================================
  transform/k8s_service_name:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        statements:
          - set(resource.attributes["service.name"], resource.attributes["devopsmate.io/service-name"]) where resource.attributes["devopsmate.io/service-name"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["app.kubernetes.io/name"]) where resource.attributes["app.kubernetes.io/name"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["app"]) where resource.attributes["app"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["k8s.deployment.name"]) where resource.attributes["k8s.deployment.name"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["k8s.statefulset.name"]) where resource.attributes["k8s.statefulset.name"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["k8s.daemonset.name"]) where resource.attributes["k8s.daemonset.name"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.version"], resource.attributes["app.kubernetes.io/version"]) where resource.attributes["app.kubernetes.io/version"] != nil
    log_statements:
      - context: log
        statements:
          - set(resource.attributes["service.name"], resource.attributes["devopsmate.io/service-name"]) where resource.attributes["devopsmate.io/service-name"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["app.kubernetes.io/name"]) where resource.attributes["app.kubernetes.io/name"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["app"]) where resource.attributes["app"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["k8s.deployment.name"]) where resource.attributes["k8s.deployment.name"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["k8s.statefulset.name"]) where resource.attributes["k8s.statefulset.name"] != nil and resource.attributes["service.name"] == nil
    trace_statements:
      - context: span
        statements:
          - set(resource.attributes["service.name"], resource.attributes["devopsmate.io/service-name"]) where resource.attributes["devopsmate.io/service-name"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["app.kubernetes.io/name"]) where resource.attributes["app.kubernetes.io/name"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["app"]) where resource.attributes["app"] != nil and resource.attributes["service.name"] == nil
          - set(resource.attributes["service.name"], resource.attributes["k8s.deployment.name"]) where resource.attributes["k8s.deployment.name"] != nil and resource.attributes["service.name"] == nil

  # ===========================================================================
  # Port-to-service mapping (on spans)
  # ===========================================================================
  transform/port_mapping:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["peer.service.type"], "database") where attributes["net.peer.port"] == 3306 or attributes["server.port"] == 3306
          - set(attributes["peer.service.type"], "database") where attributes["net.peer.port"] == 5432 or attributes["server.port"] == 5432
          - set(attributes["peer.service.type"], "database") where attributes["net.peer.port"] == 27017 or attributes["server.port"] == 27017
          - set(attributes["peer.service.type"], "cache") where attributes["net.peer.port"] == 6379 or attributes["server.port"] == 6379
          - set(attributes["peer.service.type"], "message-queue") where attributes["net.peer.port"] == 5672 or attributes["server.port"] == 5672
          - set(attributes["peer.service.type"], "message-queue") where attributes["net.peer.port"] == 9092 or attributes["server.port"] == 9092
          - set(attributes["peer.service.type"], "search") where attributes["net.peer.port"] == 9200 or attributes["server.port"] == 9200

  # ===========================================================================
  # Trace-log correlation
  # ===========================================================================
  transform/trace_log_correlation:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(attributes["trace_id"], attributes["traceId"]) where attributes["trace_id"] == nil and attributes["traceId"] != nil
          - set(attributes["trace_id"], attributes["TraceId"]) where attributes["trace_id"] == nil and attributes["TraceId"] != nil
          - set(attributes["trace_id"], attributes["traceID"]) where attributes["trace_id"] == nil and attributes["traceID"] != nil
          - set(attributes["trace_id"], attributes["dd.trace_id"]) where attributes["trace_id"] == nil and attributes["dd.trace_id"] != nil
          - set(attributes["span_id"], attributes["spanId"]) where attributes["span_id"] == nil and attributes["spanId"] != nil
          - set(attributes["span_id"], attributes["SpanId"]) where attributes["span_id"] == nil and attributes["SpanId"] != nil
          - set(attributes["span_id"], attributes["dd.span_id"]) where attributes["span_id"] == nil and attributes["dd.span_id"] != nil
          - set(trace_id.string, attributes["trace_id"]) where trace_id == nil and attributes["trace_id"] != nil
          - set(span_id.string, attributes["span_id"]) where span_id == nil and attributes["span_id"] != nil
          - delete_key(attributes, "traceId") where attributes["traceId"] != nil
          - delete_key(attributes, "TraceId") where attributes["TraceId"] != nil
          - delete_key(attributes, "traceID") where attributes["traceID"] != nil
          - delete_key(attributes, "dd.trace_id") where attributes["dd.trace_id"] != nil
          - delete_key(attributes, "spanId") where attributes["spanId"] != nil
          - delete_key(attributes, "SpanId") where attributes["SpanId"] != nil
          - delete_key(attributes, "dd.span_id") where attributes["dd.span_id"] != nil

  # Container runtime tagging
  transform/container_metadata:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        statements:
          - set(resource.attributes["container.runtime"], "containerd") where resource.attributes["container.id"] != nil
    log_statements:
      - context: log
        statements:
          - set(resource.attributes["container.runtime"], "containerd") where resource.attributes["k8s.container.name"] != nil

  # ===========================================================================
  # Filters
  # ===========================================================================
  filter/metrics:
    error_mode: ignore
    metrics:
      datapoint:
        - 'resource.attributes["k8s.namespace.name"] == "kube-system"'

  filter/logs:
    error_mode: ignore
    logs:
      log_record:
        - 'IsMatch(body, ".*GET /healthz.*") == true'
        - 'IsMatch(body, ".*GET /readyz.*") == true'
        - 'IsMatch(body, ".*GET /livez.*") == true'
        - 'IsMatch(body, ".*kube-probe.*") == true'

  # ===========================================================================
  # Batch
  # ===========================================================================
  batch/metrics:
    timeout: 15s
    send_batch_size: 2048
    send_batch_max_size: 4096

  batch/logs:
    timeout: 5s
    send_batch_size: 2000
    send_batch_max_size: 4000

  batch/traces:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

exporters:
  # ===========================================================================
  # Single exporter: agent → gateway
  # ===========================================================================
  otlp/gateway:
    endpoint: ${env:DEVOPSMATE_GATEWAY_ENDPOINT}
    # Secure by default: authenticate every agent with the gateway token, and use
    # TLS. Auth is independent of TLS, so it still protects a not-yet-TLS internal
    # gateway (set DEVOPSMATE_OTLP_INSECURE=true) while authenticating the agent.
    auth:
      authenticator: bearertokenauth/gateway
    tls:
      insecure: ${env:DEVOPSMATE_OTLP_INSECURE}
      insecure_skip_verify: ${env:DEVOPSMATE_TLS_SKIP_VERIFY}
    compression: zstd
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 10000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    timeout: 30s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: /health

  # Authenticate agent → gateway with the shared agent token (validated at the gateway)
  bearertokenauth/gateway:
    token: ${env:DEVOPSMATE_API_KEY}

  # K8s observer — discovery source for receiver_creator
  k8s_observer:
    auth_type: serviceAccount
    node: ${env:K8S_NODE_NAME}
    observe_pods: true
    observe_nodes: false

service:
  extensions: [health_check, bearertokenauth/gateway, k8s_observer]

  telemetry:
    logs:
      level: info
      encoding: json
    metrics:
      level: detailed
      address: 0.0.0.0:8888

  pipelines:
    metrics:
      receivers: [kubeletstats, otlp, receiver_creator]
      processors: [memory_limiter, k8sattributes, resourcedetection, resource, transform/k8s_service_name, transform/container_metadata, filter/metrics, batch/metrics]
      exporters: [otlp/gateway]

    metrics/health:
      receivers: [httpcheck/ingress]
      processors: [memory_limiter, resource, batch/metrics]
      exporters: [otlp/gateway]

    logs:
      receivers: [filelog, k8s_events, otlp]
      processors: [memory_limiter, k8sattributes, resourcedetection, resource, transform/k8s_service_name, transform/trace_log_correlation, transform/container_metadata, filter/logs, batch/logs]
      exporters: [otlp/gateway]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resourcedetection, resource, transform/k8s_service_name, transform/port_mapping, batch/traces]
      exporters: [otlp/gateway]
