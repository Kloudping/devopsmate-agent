name: Release Helm Chart

# Packages charts under charts/** and publishes them to the gh-pages branch,
# which GitHub Pages serves as a Helm repo at https://kloudping.github.io/devopsmate-agent
# Note: chart-releaser only releases a chart when its version in Chart.yaml changes —
# bump charts/devopsmate-agent/Chart.yaml `version:` for each release.

on:
  push:
    branches: [master]
    paths:
      - 'charts/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
